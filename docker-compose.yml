# ╔══════════════════════════════════════════════════════════════════════╗
# ║  BGP Lab Platform — Docker Compose                                  ║
# ║  Sobe: nginx (proxy), backend (Node.js), e permite execução de      ║
# ║  ContainerLab via socket Docker do host.                            ║
# ╚══════════════════════════════════════════════════════════════════════╝

services:

  # ── Nginx reverse proxy + frontend estático ──────────────────────────
  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bgplab-nginx
    ports:
      - "${HTTP_BIND:-127.0.0.1}:${HTTP_PORT:-8088}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - bgplab-mgmt

  # ── Backend Node.js ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bgplab-backend
    environment:
      - PORT=${PORT:-3000}
      - HOST=${BACKEND_BIND:-127.0.0.1}
      - LAB_BASE_DIR=${LAB_HOST_BASE_DIR:-/opt/bgp-labs}
      - LAB_HOST_BASE_DIR=${LAB_HOST_BASE_DIR:-/opt/bgp-labs}
      - FRR_IMAGE=${FRR_IMAGE:-frrouting/frr:latest}
      - TEACHER_PASSWORD=${TEACHER_PASSWORD:-bgp@teach2025}
      - TEACHER_EMAIL=${TEACHER_EMAIL:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - NODE_ENV=production
    volumes:
      # ⚠️  CRÍTICO: acesso ao Docker do host para criar containers ContainerLab
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      # ContainerLab precisa enxergar os network namespaces dos containers
      # criados no Docker host para conectar os links da topologia.
      - ${DOCKER_NETNS_DIR:-/var/run/docker/netns}:/var/run/docker/netns
      - ${HOST_NETNS_DIR:-/var/run/netns}:/var/run/netns
      # Diretório compartilhado para arquivos de lab. O caminho do host tambem
      # e usado nos binds gerados para os containers FRR. Em VPS Linux, mantenha
      # LAB_HOST_BASE_DIR como caminho absoluto existente no host.
      - ${LAB_HOST_BASE_DIR:-/opt/bgp-labs}:${LAB_HOST_BASE_DIR:-/opt/bgp-labs}
    network_mode: host
    restart: unless-stopped
    privileged: true   # necessário para criar redes Docker e namespaces de rede

networks:
  bgplab-mgmt:
    driver: bridge
